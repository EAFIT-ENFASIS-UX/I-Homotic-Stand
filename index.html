<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I-HOMOTIC | Visualizador 3D</title>
  <meta name="description" content="Visualizador 3D interactivo de modelos arquitectónicos — I-HOMOTIC" />
  <link rel="icon" type="image/svg+xml" href="https://i-homotic.vercel.app/Favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════
       CSS Variables — I-HOMOTIC Palette
    ═══════════════════════════════════════ */
    :root {
      --color-bg: #081C35;
      --color-bg-light: #0d2444;
      --color-surface: rgba(255, 255, 255, 0.04);
      --color-surface-hover: rgba(255, 255, 255, 0.08);
      --color-border: rgba(155, 196, 98, 0.15);
      --color-accent-primary: #9BC462;
      --color-accent-secondary: #7B5AA2;
      --color-text: #E3E3E4;
      --color-text-muted: rgba(227, 227, 228, 0.5);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ═══════════════════════════════════════
       Reset & Base
    ═══════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════════════
       Canvas
    ═══════════════════════════════════════ */
    #viewer-canvas {
      width: 100%;
      height: 100%;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      outline: none;
    }

    /* ═══════════════════════════════════════
       Top Bar
    ═══════════════════════════════════════ */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: linear-gradient(180deg, rgba(8, 28, 53, 0.85) 0%, rgba(8, 28, 53, 0) 100%);
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .top-bar > * {
      pointer-events: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .brand-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: 1.5px;
    }

    .brand-subtitle {
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--color-text-muted);
      letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════════
       Bottom Controls
    ═══════════════════════════════════════ */
    .bottom-controls {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      display: flex;
      gap: 0.5rem;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .bottom-controls > * {
      pointer-events: auto;
    }

    .ctrl-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: rgba(8, 28, 53, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--color-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      outline: none;
    }

    .ctrl-btn:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-accent-primary);
      color: var(--color-accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(155, 196, 98, 0.15);
    }

    .ctrl-btn:active {
      transform: translateY(0);
    }

    .ctrl-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ═══════════════════════════════════════
       Loading Screen
    ═══════════════════════════════════════ */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .loading-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .loading-brand-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading-brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .loading-brand-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--color-text);
    }

    .loading-bar-container {
      width: 260px;
      height: 3px;
      background: var(--color-surface);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-accent-primary), var(--color-accent-secondary));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .loading-percentage {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-muted);
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
    }

    .loading-status {
      font-size: 0.7rem;
      color: var(--color-text-muted);
      letter-spacing: 0.3px;
    }

    /* ═══════════════════════════════════════
       Radial Glow (Background Decoration)
    ═══════════════════════════════════════ */
    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
    }

    .bg-glow--green {
      background: var(--color-accent-primary);
      top: -200px;
      right: -200px;
      opacity: 0.08;
    }

    .bg-glow--purple {
      background: var(--color-accent-secondary);
      bottom: -200px;
      left: -200px;
      opacity: 0.06;
    }

    /* ═══════════════════════════════════════
       Help Modal Overlay
    ═══════════════════════════════════════ */
    .help-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(8, 28, 53, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 1;
      visibility: visible;
      transition: opacity var(--transition), visibility var(--transition);
    }

    .help-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .help-modal {
      background: var(--color-bg-light);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transform: translateY(0);
      transition: transform var(--transition);
    }

    .help-overlay.hidden .help-modal {
      transform: translateY(20px);
    }

    .help-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .help-header h3 {
      font-size: 1.2rem;
      color: var(--color-accent-primary);
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
    }

    .close-btn:hover {
      color: var(--color-text);
    }

    .help-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .help-col {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .help-col h4 {
      font-size: 0.9rem;
      color: var(--color-text);
      margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--color-surface-hover);
      padding-bottom: 0.5rem;
    }

    .help-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .help-item kbd {
      background: var(--color-surface);
      border: 1px solid var(--color-surface-hover);
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      font-family: 'Sora', sans-serif;
      color: var(--color-text);
      font-weight: 500;
      width: fit-content;
    }

    /* Device-specific logic */
    @media (hover: none) and (pointer: coarse) {
      .help-col-desktop { display: none; }
      .help-grid { grid-template-columns: 1fr; }
    }
    @media (hover: hover) and (pointer: fine) {
      .help-col-mobile { display: none; }
      .help-grid { grid-template-columns: 1fr; }
    }

    /* ═══════════════════════════════════════
       Responsive
    ═══════════════════════════════════════ */
    @media (max-width: 600px) {
      .top-bar {
        padding: 0.75rem 1rem;
      }

      .brand-name {
        font-size: 0.75rem;
      }

      .brand-subtitle {
        display: none;
      }

      .brand-logo {
        width: 28px;
        height: 28px;
        font-size: 0.65rem;
      }

      .ctrl-btn {
        width: 38px;
        height: 38px;
      }

      .loading-bar-container {
        width: 200px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Decoration -->
  <div class="bg-glow bg-glow--green"></div>
  <div class="bg-glow bg-glow--purple"></div>

  <!-- Loading Screen -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-content">
      <div class="loading-brand">
        <div class="loading-brand-icon"><img src="https://i-homotic.vercel.app/Favicon.svg" alt="I-HOMOTIC Logo" /></div>
        <span class="loading-brand-name">I-HOMOTIC</span>
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <span class="loading-percentage" id="loading-percentage">0%</span>
      <span class="loading-status" id="loading-status">Cargando modelo 3D…</span>
    </div>
  </div>

  <!-- 3D Canvas -->
  <canvas id="viewer-canvas"></canvas>

  <!-- Top Bar -->
  <div class="top-bar" id="top-bar">
    <a class="brand" href="https://i-homotic.vercel.app/" target="_blank" rel="noopener">
      <div class="brand-logo"><img src="https://i-homotic.vercel.app/Favicon.svg" alt="I-HOMOTIC Logo" /></div>
      <div class="brand-text">
        <span class="brand-name">I-HOMOTIC</span>
        <span class="brand-subtitle">Visualizador 3D</span>
      </div>
    </a>
    <button class="ctrl-btn" id="btn-help" title="Ayuda y Controles" aria-label="Ayuda">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
  </div>

  <!-- Bottom Controls -->
  <div class="bottom-controls" id="bottom-controls">
    <button class="ctrl-btn" id="btn-reset" title="Centrar y rotar" aria-label="Centrar y rotar">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-bg" title="Alternar fondo" aria-label="Alternar fondo">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-fullscreen" title="Pantalla completa" aria-label="Pantalla completa">
      <svg viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" />
      </svg>
    </button>
  </div>

  <!-- Help Modal Overlay -->
  <div class="help-overlay hidden" id="help-overlay">
    <div class="help-modal">
      <div class="help-header">
        <h3>Controles 3D</h3>
        <button class="close-btn" id="btn-close-help" aria-label="Cerrar ayuda">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="help-grid">
        <div class="help-col help-col-desktop">
          <h4>Desktop 💻</h4>
          <div class="help-item">
            <span>Rotar modelo</span>
            <kbd>Clic Izquierdo + Arrastrar</kbd>
          </div>
          <div class="help-item">
            <span>Zoom</span>
            <kbd>Rueda del Ratón</kbd>
          </div>
          <div class="help-item">
            <span>Mover cámara</span>
            <kbd>Clic Derecho + Arrastrar</kbd>
          </div>
        </div>
        <div class="help-col help-col-mobile">
          <h4>Móvil 📱</h4>
          <div class="help-item">
            <span>Rotar modelo</span>
            <kbd>Deslizar con 1 Dedo</kbd>
          </div>
          <div class="help-item">
            <span>Zoom</span>
            <kbd>Pellizcar</kbd>
          </div>
          <div class="help-item">
            <span>Mover cámara</span>
            <kbd>Deslizar con 2 Dedos</kbd>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Three.js from jsDelivr CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

    // ─── DOM References ────────────────────
    const canvas = document.getElementById('viewer-canvas');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingBar = document.getElementById('loading-bar');
    const loadingPercentage = document.getElementById('loading-percentage');
    const loadingStatus = document.getElementById('loading-status');
    const btnFullscreen = document.getElementById('btn-fullscreen');
    const btnReset = document.getElementById('btn-reset');
    const btnBg = document.getElementById('btn-bg');
    const btnHelp = document.getElementById('btn-help');
    const helpOverlay = document.getElementById('help-overlay');
    const btnCloseHelp = document.getElementById('btn-close-help');

    let initialCameraPosition = new THREE.Vector3();

    // ─── Mobile Detection & Optimization ───
    const isMobile = window.innerWidth < 768 || /Mobi|Android/i.test(navigator.userAgent);

    // ─── Scene Setup ───────────────────────
    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: !isMobile, // Desactivar antialiasing en móviles para ganar FPS
      alpha: true,
      powerPreference: 'high-performance'
    });
    // Limitar resolución a 1x en móviles (evita sobrecalentamiento y caídas de FPS)
    renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    renderer.shadowMap.enabled = !isMobile; // Apagar sombras en móviles
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    scene.background = null;

    // ─── Camera ────────────────────────────
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.01,
      1000
    );
    camera.position.set(5, 3, 5);

    // ─── Environment (Studio Lighting) ─────
    let envTexture = null;
    new RGBELoader().load(
      'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr',
      function (texture) {
        texture.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = texture;
        envTexture = texture;
        if (showEnvBg) scene.background = envTexture;
      }
    );

    // ─── Subtle Ambient + Directional for shadows ─
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = !isMobile;
    
    if (!isMobile) {
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.camera.near = 0.1;
      dirLight.shadow.camera.far = 50;
      dirLight.shadow.camera.left = -10;
      dirLight.shadow.camera.right = 10;
      dirLight.shadow.camera.top = 10;
      dirLight.shadow.camera.bottom = -10;
      dirLight.shadow.bias = -0.001;
    }
    scene.add(dirLight);

    // ─── Controls ──────────────────────────
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.maxPolarAngle = Math.PI / 1.8;
    controls.minDistance = 0.5;
    controls.maxDistance = 50;
    controls.enablePan = true;
    controls.panSpeed = 0.5;

    // Stop auto-rotate when user interacts
    let userInteracted = false;
    controls.addEventListener('start', () => {
      userInteracted = true;
      controls.autoRotate = false;
    });

    // ─── Load Model ────────────────────────
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);
    loader.setMeshoptDecoder(MeshoptDecoder);

    loader.load(
      './Modelo-final-detailled-normal.glb',
      (gltf) => {
        const model = gltf.scene;

        // Enable shadows on all meshes only if not mobile
        if (!isMobile) {
          model.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
        }

        // Center and scale model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4 / maxDim;
        model.scale.setScalar(scale);

        scene.add(model);

        // Position camera based on model size
        const scaledSize = size.clone().multiplyScalar(scale);
        const dist = Math.max(scaledSize.x, scaledSize.y, scaledSize.z) * 2;
        initialCameraPosition.set(dist, dist * 0.6, dist);
        camera.position.copy(initialCameraPosition);
        controls.target.set(0, 0, 0);
        controls.update();

        // Update shadow camera
        if (!isMobile) {
          const halfSize = Math.max(scaledSize.x, scaledSize.z) * 1.5;
          dirLight.shadow.camera.left = -halfSize;
          dirLight.shadow.camera.right = halfSize;
          dirLight.shadow.camera.top = halfSize;
          dirLight.shadow.camera.bottom = -halfSize;
          dirLight.shadow.camera.updateProjectionMatrix();
        }

        // Hide loading screen
        loadingStatus.textContent = '¡Listo!';
        setTimeout(() => {
          loadingOverlay.classList.add('hidden');
        }, 400);
      },
      (xhr) => {
        if (xhr.lengthComputable) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          loadingBar.style.width = pct + '%';
          loadingPercentage.textContent = pct + '%';
          if (pct < 30) {
            loadingStatus.textContent = 'Descargando modelo…';
          } else if (pct < 70) {
            loadingStatus.textContent = 'Procesando geometría…';
          } else if (pct < 100) {
            loadingStatus.textContent = 'Preparando materiales…';
          }
        }
      },
      (error) => {
        console.error('Error loading model:', error);
        loadingStatus.textContent = 'Error al cargar el modelo';
        loadingPercentage.textContent = '✕';
        loadingBar.style.background = '#e53935';
        loadingBar.style.width = '100%';
      }
    );

    // ─── Bottom Controls Actions ───────────
    btnReset.addEventListener('click', () => {
      controls.target.set(0, 0, 0);
      camera.position.copy(initialCameraPosition);
      controls.autoRotate = true;
      userInteracted = false;
      controls.update();
    });

    let showEnvBg = false;
    btnBg.addEventListener('click', () => {
      showEnvBg = !showEnvBg;
      if (showEnvBg && envTexture) {
        scene.background = envTexture;
      } else {
        scene.background = null;
      }
    });

    // ─── Help Overlay ──────────────────────
    btnHelp.addEventListener('click', () => {
      helpOverlay.classList.remove('hidden');
    });
    
    btnCloseHelp.addEventListener('click', () => {
      helpOverlay.classList.add('hidden');
    });

    // Clic fuera del modal para cerrar
    helpOverlay.addEventListener('click', (e) => {
      if (e.target === helpOverlay) {
        helpOverlay.classList.add('hidden');
      }
    });

    // ─── Fullscreen ────────────────────────
    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    // Update fullscreen icon
    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      btnFullscreen.innerHTML = isFs
        ? `<svg viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3" /></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3" /></svg>`;
    });

    // ─── Resize Handler ────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animation Loop ────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
